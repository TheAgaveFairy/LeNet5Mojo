[workspace]
authors = ["Paul Dutton <jodgey4@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "LeNet5Mojo"
platforms = ["linux-64"]
version = "0.2.0"

[tasks]
formatall = "mojo format *.mojo; mojo format cpu/*.mojo; mojo format gpu/*mojo"

#tests = { cmd = "mojo arena.mojo; mojo mylogger.mojo; mojo ops.mojo; mojo tokenizer/tokenchunks.mojo; mojo tokenizer/tests.mojo && rm temp.tok", cwd = "src" }
sanitize = { cmd = "mojo build -g2 -O1 --sanitize=address -Xlinker -lm main.mojo && ./main" }
cdebug = { cmd = "mojo build -g2 -O1 --debug-info-language=C -Xlinker -lm main.mojo", cwd = "src" }
buildmain = { cmd = "mojo build -Xlinker -lm main.mojo", cwd = "src" }
#flamegraphs = { cmd = "./flamegraphing/graphmain.sh; ./flamegraphing/graphtokenizer.sh;", cwd = "src" }

[dependencies]
#mojo = ">=0.26.3.0.dev2026041520,<0.27"
matplotlib = ">=3.10.9,<4"
numpy = ">=2.4.3,<3"
mojo = ">=1.0.0b1.dev2026042505,<2"
