[workspace]
authors = ["Paul Dutton <jodgey4@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "LeNet5Mojo"
platforms = ["linux-64"]
version = "0.2.0"

[tasks]
formatall = "mojo format src/*.mojo; mojo format src/cpu/*.mojo; mojo format src/accel/*.mojo"

sanitize = { cmd = "mojo build -g2 -O1 --sanitize=address -Xlinker -lm src/main.mojo && ./main"}
cdebug = { cmd = "mojo build -g2 -O1 --debug-info-language=C -Xlinker -lm src/main.mojo"}
buildmain = { cmd = "mojo build -Xlinker -lm main.mojo", cwd = "src" }
nsysprofile = { cmd = "nsys profile --trace=nvtx,cuda --force-overwrite=true --output=basic mojo src/main.mojo && nsys stats --force-export=true basic.nsys-rep", cwd = "."}
nsysprofile_gpu = { cmd = "nsys profile --trace=nvtx,cuda --force-overwrite=true --output=gpu_profile mojo -I src tests/profile_gpu.mojo && nsys stats --force-export=true gpu_profile.nsys-rep", cwd = "."}
ncuprofile_gpu = { cmd = "ncu --set basic --launch-count 80 --target-processes all -o ncu_gpu mojo -I src tests/profile_gpu.mojo", cwd = "."}

[dependencies]
matplotlib = ">=3.10.9,<4"
numpy = ">=2.4.6,<3"
mojo = ">=1.0.0b2.dev2026053106,<2"
pandas = ">=3.0.3,<4"
cuda-toolkit = ">=13.3.0,<14"
max = ">=26.4.0.dev2026060406,<27"
